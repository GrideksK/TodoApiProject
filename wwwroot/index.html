<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo API Client</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e2e; color: #cdd6f4; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: #252538; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        h1 { text-align: center; color: #cba6f7; margin-bottom: 20px; }
        .form-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border: 1px solid #45475a; border-radius: 6px; background: #313244; color: #cdd6f4; font-size: 16px; }
        input:focus { border-color: #cba6f7; outline: none; }
        button { padding: 12px 20px; border: none; border-radius: 6px; background: #cba6f7; color: #11111b; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
        button:hover { background: #b4befe; }
        .category-list { list-style: none; padding: 0; margin: 0; }
        .category-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #313244; margin-bottom: 8px; border-radius: 6px; border-left: 4px solid #f38ba8; }
        .category-name { font-weight: 500; }
        .task-count { background: #45475a; padding: 4px 8px; border-radius: 12px; font-size: 12px; color: #a6adc8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Мои Категории</h1>
        <div class="form-group">
            <input type="text" id="categoryInput" placeholder="Название новой категории...">
            <button onclick="createCategory()">Добавить</button>
        </div>
        <ul class="category-list" id="categoryList"></ul>
    </div>

    <script>
        const API_URL = '/api/category';

        // Загрузка категорий при старте страницы
        async function loadCategories() {
            try {
                const response = await fetch(API_URL);
                const categories = await response.json();
                const list = document.getElementById('categoryList');
                list.innerHTML = '';

                categories.forEach(cat => {
                    const li = document.createElement('li');
                    li.className = 'category-item';
                    li.innerHTML = `
                        <span class="category-name">${cat.name}</span>
                        <span class="task-count">Задач: ${cat.todoItems ? cat.todoItems.length : 0}</span>
                    `;
                    list.appendChild(li);
                });
            } catch (error) {
                console.error('Ошибка при загрузке данных:', error);
            }
        }

        // Создание новой категории
        async function createCategory() {
            const input = document.getElementById('categoryInput');
            const name = input.value.trim();
            if (!name) return;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name })
                });

                if (response.ok) {
                    input.value = '';
                    loadCategories(); // Перезагружаем список
                }
            } catch (error) {
                console.error('Ошибка при создании категории:', error);
            }
        }

        // Запускаем загрузку
        loadCategories();
    </script>
</body>
</html>
